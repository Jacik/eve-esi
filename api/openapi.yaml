  /characters/{character_id}/agents_research:
    get:
      description: "Return a list of agents research information for a character.\
        \ The formula for finding the current research points with an agent is: currentPoints\
        \ = remainderPoints + pointsPerDay * days(currentTime - researchStartDate)"
      operationId: GetCharacterResearchAgents
      parameters:
      - description: The ID of the character
        explode: false
        in: path
        name: character_id
        required: true
        schema:
          $ref: "#/components/schemas/CharacterID"
        style: simple
      - $ref: "#/components/parameters/AcceptLanguage"
      - $ref: "#/components/parameters/IfNoneMatch"
      - $ref: "#/components/parameters/CompatibilityDate"
      - $ref: "#/components/parameters/Tenant"
