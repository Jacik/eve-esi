        $ref: "#/components/schemas/AllianceContactsLabelsResponse_inner"
      type: array
    AllianceCorporationsResponse:
      items:
        format: int64
        type: integer
      type: array
      uniqueItems: true
    AllianceResponse:
      example:
        ticker: ticker
