  /characters/{character_id}/calendar:
    get:
      description: "Get 50 event summaries from the calendar. If no from_event ID\
        \ is given, the resource will return the next 50 chronological event summaries\
        \ from now. If a from_event ID is specified, it will return the next 50 chronological\
        \ event summaries from after that event"
      operationId: GetCharacterCalendar
      parameters:
      - description: The ID of the character
        explode: false
        in: path
        name: character_id
        required: true
        schema:
          $ref: "#/components/schemas/CharacterID"
        style: simple
      - explode: true
        in: query
        name: from_event
        required: false
        schema:
          description: The event ID to retrieve events from
          format: int64
          type: integer
        style: form
      - $ref: "#/components/parameters/AcceptLanguage"
      - $ref: "#/components/parameters/IfNoneMatch"
      - $ref: "#/components/parameters/CompatibilityDate"
      - $ref: "#/components/parameters/Tenant"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterCalendarResponse"
          description: OK
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      security:
      - OAuth2:
        - esi-calendar.read_calendar_events.v1
      summary: List calendar event summaries
      tags:
      - Calendar
      x-cache-age: 5
      x-compatibility-date: 2020-01-01
      x-accepts:
      - application/json
  /characters/{character_id}/calendar/{event_id}:
    get:
      description: Get all the information for a specific event
      operationId: GetCharacterCalendarEvent
      parameters:
      - description: The ID of the character
        explode: false
        in: path
        name: character_id
        required: true
        schema:
          $ref: "#/components/schemas/CharacterID"
        style: simple
      - explode: false
        in: path
        name: event_id
        required: true
        schema:
          description: The id of the event requested
          format: int64
          type: integer
        style: simple
      - $ref: "#/components/parameters/AcceptLanguage"
      - $ref: "#/components/parameters/IfNoneMatch"
      - $ref: "#/components/parameters/CompatibilityDate"
      - $ref: "#/components/parameters/Tenant"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterCalendarEventResponse"
          description: OK
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      security:
      - OAuth2:
        - esi-calendar.read_calendar_events.v1
      summary: Get an event
      tags:
      - Calendar
      x-cache-age: 5
      x-compatibility-date: 2020-01-01
      x-accepts:
      - application/json
    put:
      description: Set your response status to an event
      operationId: PutCharacterCalendarEvent
      parameters:
      - description: The ID of the character
        explode: false
        in: path
        name: character_id
        required: true
        schema:
          $ref: "#/components/schemas/CharacterID"
        style: simple
      - explode: false
        in: path
        name: event_id
        required: true
        schema:
          description: The ID of the event requested
          format: int64
          type: integer
        style: simple
      - $ref: "#/components/parameters/AcceptLanguage"
      - $ref: "#/components/parameters/IfNoneMatch"
      - $ref: "#/components/parameters/CompatibilityDate"
      - $ref: "#/components/parameters/Tenant"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutCharacterCalendarEvent_request"
        required: true
      responses:
        "204":
