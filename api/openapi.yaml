        creator_id: 6
        name: name
        faction_id: 5
        date_founded: 2000-01-23T04:56:07.000+00:00
        executor_corporation_id: 1
      properties:
        creator_corporation_id:
          description: ID of the corporation that created the alliance
          format: int64
          type: integer
        creator_id:
          description: ID of the character that created the alliance
          format: int64
          type: integer
        date_founded:
          format: date-time
          type: string
        executor_corporation_id:
          description: "the executor corporation ID, if this alliance is not closed"
          format: int64
          type: integer
        faction_id:
          description: "Faction ID this alliance is fighting for, if this alliance\
            \ is enlisted in factional warfare"
