components:
  headers:
    CacheControl:
      description: "Directives for caching mechanisms. It controls how the response\
        \ can be cached, by whom, and for how long."
      explode: false
      schema: {}
      style: simple
    ContentLanguage:
      description: The language used in the response.
      explode: false
      schema:
        enum:
        - en
        - de
        - fr
        - ja
        - ru
        - zh
        - ko
        - es
      style: simple
    ETag:
      description: The ETag value of the response body. Use this with If-None-Match
        to check whether the resource has changed.
      explode: false
      schema: {}
      style: simple
    LastModified:
      description: The last modified date of the response. Use this with If-Modified-Since
        to check whether the resource has changed.
      explode: false
      schema: {}
      style: simple
  parameters:
    AcceptLanguage:
      description: The language to use for the response.
      explode: false
      in: header
      name: Accept-Language
      required: false
      schema:
        default: en
        enum:
        - en
        - de
        - fr
        - ja
        - ru
        - zh
        - ko
        - es
        type: string
      style: simple
    CompatibilityDate:
      description: The compatibility date for the request.
      explode: false
      in: header
      name: X-Compatibility-Date
      required: true
      schema:
        enum:
        - 2025-08-26
        format: date
        type: string
      style: simple
    IfModifiedSince:
      description: The date the resource was last modified. A 304 will be returned
        if the resource has not been modified since this date.
      explode: false
      in: header
      name: If-Modified-Since
      required: false
      schema:
        type: string
      style: simple
    IfNoneMatch:
      description: The ETag of the previous request. A 304 will be returned if this
        matches the current ETag.
      explode: false
      in: header
      name: If-None-Match
      required: false
      schema:
        type: string
      style: simple
    Tenant:
      description: The tenant ID for the request.
      example: ""
      explode: false
      in: header
      name: X-Tenant
      required: false
      schema:
        default: tranquility
        type: string
      style: simple
  schemas:
    AllianceID:
      format: int64
      type: integer
