paths:
  /alliances:
    get:
      description: List all active player alliances
      operationId: GetAlliances
      parameters:
      - $ref: "#/components/parameters/AcceptLanguage"
      - $ref: "#/components/parameters/IfNoneMatch"
      - $ref: "#/components/parameters/CompatibilityDate"
      - $ref: "#/components/parameters/Tenant"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlliancesResponse"
          description: OK
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      summary: List all alliances
      tags:
      - Alliance
      x-cache-age: 3600
      x-compatibility-date: 2020-01-01
      x-accepts:
      - application/json
  /alliances/{alliance_id}:
    get:
      description: Public information about an alliance
