                description: item_id integer
                format: int64
                type: integer
              maxItems: 1000
              minItems: 1
              type: array
              uniqueItems: true
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterAssetsNamesPost"
          description: OK
          headers:
